name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  RHEO_VERSION: v0.4.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rheo binary
        id: cache-rheo
        uses: actions/cache@v4
        with:
          path: .rheo-binary
          key: rheo-${{ env.RHEO_VERSION }}-x86_64-linux

      - name: Download rheo
        if: steps.cache-rheo.outputs.cache-hit != 'true'
        run: |
          mkdir -p .rheo-binary
          curl -sL "https://github.com/freecomputinglab/rheo/releases/download/${RHEO_VERSION}/rheo-x86_64-unknown-linux-gnu.zip" -o /tmp/rheo.zip
          unzip -o /tmp/rheo.zip -d .rheo-binary
          chmod +x .rheo-binary/rheo
          rm /tmp/rheo.zip

      - name: Add rheo to PATH
        run: echo "$PWD/.rheo-binary" >> "$GITHUB_PATH"

      - name: Compile with rheo
        run: |
          rheo --version
          rheo compile .
          test -f build/html/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
